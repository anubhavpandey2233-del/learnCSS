<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/productcard2.css">
</head>

<body>
    <div class="productcard">
        <div class="productimg">

            <div class="img1">
                <i class="fa-solid fa-share-nodes i1"></i>
                <i class="fa-regular fa-heart i2"></i>
                <img src="images/apple.png" alt="">
            </div>
            <div class="images">
                <a href="#" class="box">
                    <img src="images/apl1.png" alt="" class="img2 ">
                </a>

                <a href="#" class="box">
                    <img src="images/apl2.png" alt="" class="img3">
                </a>

                <a href="#" class="box">
                    <img src="images/apl3.png" alt="" class="img4">
                </a>

                <a href="#" class="box">
                    <img src="images/apple.png" alt="" class="img5">
                </a>

            </div>

        </div>
        <div class="productdata">
            <div class="data">
                <h3>Delicious Apples</h3>
                <span class="s1">Rs</span>
                <span class="s2">7.93</span>
                <p>Select A Color</p>
            </div>
            <div class="dataimages">
                <a href="#" class="box2 boxBorder">
                    <img src="images/apl1.png" alt="" class="img6">
                </a>

                <a href="#" class="box2">
                    <img src="images/apl2.png" alt="" class="img7">
                </a>

                <a href="#" class="box2">
                    <img src="images/apl3.png" alt="" class="img8">
                </a>
                <a href="#" class="box2">
                    <img src="images/apple.png" alt="" class="img9">
                </a>
            </div>
            <p class="p1">Benefits</p>
            <div class="benefits">
                <ul>
                    <li>Lorem, ipsum dolor.</li>
                    <li>Lorem ipsum dolor sit amet.</li>
                    <li>Lorem ipsum dolor sit amet.</li>
                    <li>Lorem ipsum dolor sit amet.</li>
                </ul>
            </div>

            <a class="cart" href="#">ADD TO CART</a>

        </div>
    </div>

</body>

</html>
